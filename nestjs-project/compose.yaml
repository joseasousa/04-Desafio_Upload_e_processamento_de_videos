services:
  nestjs-api:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - 3000:3000
    volumes:
      - .:/home/node/app
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=streamtube
      - DB_PASSWORD=streamtube
      - DB_NAME=streamtube
      - JWT_SECRET=dev-access-secret
      - JWT_REFRESH_SECRET=dev-refresh-secret
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_PUBLIC_ENDPOINT=http://localhost:9000
      - STORAGE_REGION=us-east-1
      - STORAGE_ACCESS_KEY=streamtube
      - STORAGE_SECRET_KEY=streamtube
      - STORAGE_BUCKET=streamtube-videos
      - QUEUE_HOST=redis
      - QUEUE_PORT=6379

  db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=streamtube
      - POSTGRES_PASSWORD=streamtube
      - POSTGRES_DB=streamtube
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamtube"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=streamtube
      - MINIO_ROOT_PASSWORD=streamtube
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 streamtube streamtube;
      mc mb -p local/streamtube-videos;
      exit 0;
      "

  video-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run start:worker:dev
    volumes:
      - .:/home/node/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=streamtube
      - DB_PASSWORD=streamtube
      - DB_NAME=streamtube
      - JWT_SECRET=dev-access-secret
      - JWT_REFRESH_SECRET=dev-refresh-secret
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_PUBLIC_ENDPOINT=http://localhost:9000
      - STORAGE_REGION=us-east-1
      - STORAGE_ACCESS_KEY=streamtube
      - STORAGE_SECRET_KEY=streamtube
      - STORAGE_BUCKET=streamtube-videos
      - QUEUE_HOST=redis
      - QUEUE_PORT=6379

